name: Mirror to GitLab
on:
  push:
    branches:
      - main
jobs:
  mirror:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add GitLab remote
        run: |
          git remote add gitlab "https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/bighead.zimm/zelda-la-dx-hd-updated.git"

      - name: Push snapshot to GitLab
        run: |
          git checkout --orphan gitlab-snapshot
          git commit -m "Snapshot of ${GITHUB_REF_NAME}@${GITHUB_SHA::7}"
          git push -f gitlab "HEAD:refs/heads/${GITHUB_REF_NAME}"