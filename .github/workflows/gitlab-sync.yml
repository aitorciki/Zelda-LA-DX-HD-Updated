
###############################################################################################################
#                                                                                                             #
#  Zelda-LA-DX-HD-Updated - SYNC REPOSITORY TO GITLAB                                                         #
#                                                                                                             #
###############################################################################################################
#                                                                                                             #
#  PURPOSE:                                                                                                   #
#  Sync the repository to GitLab as a backup for the "just-in-case" situation.                                #
#                                                                                                             #
#  MAIN REPOSITORY:                                                                                           #
#  https://github.com/BigheadSMZ/Zelda-LA-DX-HD-Updated                                                       #
#                                                                                                             #
#  BACKUP REPOSITORY:                                                                                         #
#  https://gitlab.com/bighead.zimm/zelda-la-dx-hd-updated                                                     #
#                                                                                                             #
#  NOTICE:                                                                                                    #
#  Because I keep hitting the GitLab 10GB limit, this script no longer mirrors the history. Going forward,    #
#  each run pushes a fresh snapshot of the current files to the GitLab backup repo. This is not ideal, but    #
#  backing up the game and preserving the progress is more important than fully preserving how it got there.  #
#                                                                                                             #
###############################################################################################################

name: Mirror to GitLab
on:
  push:
    branches:
      - main
jobs:
  mirror:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add GitLab remote
        run: |
          git remote add gitlab "https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/bighead.zimm/zelda-la-dx-hd-updated.git"

      - name: Push snapshot to GitLab
        run: |
          git checkout --orphan gitlab-snapshot
          git commit -m "Snapshot of ${GITHUB_REF_NAME}@${GITHUB_SHA::7}"
          git push -f gitlab "HEAD:refs/heads/${GITHUB_REF_NAME}"